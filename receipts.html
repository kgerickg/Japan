<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本沖繩消費紀錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #0f766e;
      --accent-light: #ccfbf1;
      --accent-dark: #0d5c56;
      --edit: #7c3aed;
      --edit-light: #ede9fe;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.06);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding-bottom: 5rem;
    }

    body.editing { padding-bottom: 6.5rem; }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .hero {
      background: linear-gradient(135deg, #0f766e 0%, #134e4a 55%, #1e3a5f 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      top: -40%; right: -10%;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; position: relative; }
    .hero p { opacity: 0.88; font-size: 0.95rem; position: relative; }

    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 1rem;
      margin-top: 1.5rem; position: relative;
    }

    .hero-stat {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1.25rem;
      min-width: 140px;
    }

    .hero-stat .label { font-size: 0.75rem; opacity: 0.8; }
    .hero-stat .value {
      font-size: 1.35rem; font-weight: 700;
      font-family: "JetBrains Mono", monospace;
      margin-top: 0.15rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.85rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      box-shadow: var(--shadow);
    }

    .summary-card .cat { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.35rem; }
    .summary-card .amount {
      font-family: "JetBrains Mono", monospace;
      font-size: 1.05rem; font-weight: 600; color: var(--accent-dark);
    }
    .summary-card .count { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

    .summary-card.total {
      background: var(--accent-light);
      border-color: #99f6e4;
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.5rem;
    }

    .summary-card.total .amount { font-size: 1.4rem; }

    .section { margin-bottom: 2.5rem; }

    .section-header {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }

    .section-header h2 { font-size: 1.15rem; font-weight: 600; }

    .date-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--accent); color: #fff;
      font-size: 0.85rem; font-weight: 600;
      padding: 0.35rem 0.85rem; border-radius: 999px;
    }

    .date-badge .subtotal {
      opacity: 0.85;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead { background: var(--surface-alt); border-bottom: 1px solid var(--border); }

    th {
      text-align: left; padding: 0.85rem 1rem;
      font-weight: 600; font-size: 0.78rem;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.05em; white-space: nowrap;
    }

    td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f0fdfa; }

    body.editing tbody tr:hover { background: #faf5ff; }

    .amount-cell {
      font-family: "JetBrains Mono", monospace;
      font-weight: 600; color: var(--accent-dark);
      white-space: nowrap; text-align: right;
    }

    .time-cell {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.82rem; color: var(--text-muted); white-space: nowrap;
    }

    .location { font-weight: 500; line-height: 1.45; }
    .items { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; }

    .tag {
      display: inline-block; font-size: 0.72rem; font-weight: 600;
      padding: 0.2rem 0.55rem; border-radius: 999px; margin-top: 0.35rem;
    }

    .tag-food { background: #fef3c7; color: #92400e; }
    .tag-market { background: #dbeafe; color: #1e40af; }
    .tag-shop { background: #ede9fe; color: #5b21b6; }
    .tag-tour { background: #d1fae5; color: #065f46; }
    .tag-transport { background: #e0e7ff; color: #3730a3; }
    .tag-unknown { background: #f1f5f9; color: #475569; }

    .photo-ref {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem; color: var(--text-muted);
      background: var(--surface-alt);
      padding: 0.15rem 0.45rem; border-radius: 4px;
    }

    .photo-ref a { color: var(--accent); text-decoration: none; }
    .photo-ref a:hover { text-decoration: underline; }

    .flag {
      display: inline-block; font-size: 0.72rem;
      padding: 0.1rem 0.45rem; border-radius: 4px;
      margin-left: 0.35rem; font-weight: 600;
      border: 1px solid transparent;
    }

    .flag-不算 { color: #64748b; background: #f1f5f9; border-color: #e2e8f0; }
    .flag-平分 { color: #1d4ed8; background: #dbeafe; border-color: #93c5fd; }
    .flag-部分平分 { color: #c2410c; background: #ffedd5; border-color: #fdba74; }
    .flag-永峻付 { color: #047857; background: #d1fae5; border-color: #6ee7b7; }
    .flag-方方的 { color: #7c3aed; background: #ede9fe; border-color: #c4b5fd; }

    .notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid #f59e0b;
      border-radius: var(--radius-sm);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow);
    }

    .notes h3 { font-size: 0.95rem; margin-bottom: 0.75rem; color: #b45309; }
    .notes ul { list-style: none; font-size: 0.88rem; color: var(--text-muted); }

    .notes li {
      padding: 0.35rem 0; padding-left: 1.25rem; position: relative;
    }

    .notes li::before {
      content: "•"; position: absolute; left: 0;
      color: #f59e0b; font-weight: bold;
    }

    footer {
      text-align: center; font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* Edit toolbar */
    .toolbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; flex-wrap: wrap;
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(15,23,42,0.08);
    }

    .toolbar.editing { border-top-color: #c4b5fd; background: rgba(250,245,255,0.97); }

    .btn {
      font-family: inherit;
      font-size: 0.85rem; font-weight: 600;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover { background: var(--surface-alt); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-edit { background: var(--edit); color: #fff; border-color: var(--edit); }
    .btn-edit:hover { background: #6d28d9; }
    .btn-edit.active { background: #5b21b6; }
    .btn-danger { color: #b91c1c; border-color: #fecaca; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { font-size: 0.78rem; padding: 0.35rem 0.7rem; }

    .toolbar-hint {
      font-size: 0.78rem; color: var(--text-muted);
      width: 100%; text-align: center;
    }

    .edit-input, .edit-select {
      width: 100%;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.35rem 0.5rem;
      border: 1px solid #c4b5fd;
      border-radius: 6px;
      background: #faf5ff;
    }

    .edit-input.amount { font-family: "JetBrains Mono", monospace; text-align: right; }

    .row-actions { display: flex; gap: 0.35rem; margin-top: 0.35rem; }
    .add-row-btn { margin-top: 0.75rem; }

    .save-indicator {
      font-size: 0.78rem; color: var(--accent);
      opacity: 0; transition: opacity 0.3s;
    }

    .save-indicator.show { opacity: 1; }

    .editable[contenteditable="true"] {
      outline: 1px dashed #c4b5fd;
      border-radius: 4px;
      padding: 0.1rem 0.25rem;
      min-width: 1rem;
    }

    body:not(.editing) .edit-only { display: none !important; }

    @media (max-width: 768px) {
      .page { padding: 1.25rem 1rem 3rem; }
      .hero { padding: 1.75rem 1.25rem; }
      .hero h1 { font-size: 1.4rem; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 640px; }
      th, td { padding: 0.7rem 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="page" id="app"></div>

  <div class="toolbar" id="toolbar">
    <button class="btn btn-edit" id="btn-edit" type="button">✏️ 編輯</button>
    <button class="btn btn-primary edit-only" id="btn-add" type="button">＋ 新增一筆</button>
    <button class="btn edit-only" id="btn-export" type="button">📥 匯出 JSON</button>
    <button class="btn edit-only" id="btn-import" type="button">📤 匯入 JSON</button>
    <button class="btn btn-danger edit-only" id="btn-reset" type="button">↩️ 還原預設</button>
    <span class="save-indicator" id="save-indicator">已自動儲存</span>
    <span class="toolbar-hint edit-only">編輯內容儲存在此瀏覽器本機，換裝置請用匯出／匯入同步</span>
  </div>

  <input type="file" id="import-file" accept=".json" hidden>

        { id:29, date:'2026-06-09', time:'10:00', amount:8000, location:'台灣虎航 Tigerair（OKA 那覇機場）', items:'機場超重行李 15KG', group:'transport', tag:'交通', photo:'214336', flag:'平分' },
        { id:30, date:'2026-06-09', time:'13:12', amount:550, location:'Blue Seal 那覇空港国際線ターミナル店', items:'鹽奶＆紅芋冰淇淋', group:'food', tag:'餐飲', photo:'214134', flag:'不算' },
        { id:31, date:'2026-06-09', time:'15:28', amount:990, location:'店家未印（收據頂部裁切）', items:'水果果汁 ×4', group:'food', tag:'飲料', photo:'214413', flag:'不算' },
        { id:32, date:'2026-06-06', time:'21:00', amount:70000, location:'Lieata Nakayama', items:'住宿費用', group:'unknown', tag:'住宿', photo:'', flag:'平分' },
      ],
    };

    let data = loadData();
    let editing = false;
    let nextId = Math.max(0, ...data.receipts.map(r => r.id)) + 1;

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (_) {}
      return structuredClone(DEFAULT_DATA);
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      const el = document.getElementById('save-indicator');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    function fmt(n) {
      return '¥' + Number(n).toLocaleString('ja-JP');
    }

    function dateLabel(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const days = ['日','一','二','三','四','五','六'];
      const m = d.getMonth() + 1;
      const day = d.getDate();
      return `${m}/${day}（${days[d.getDay()]}）`;
    }

    function photoLink(ref) {
      if (!ref) return '';
      const fname = ref.startsWith('2026') ? ref : `20260619_${ref}.jpg`;
      return `發票/${fname}`;
    }

    function calcStats() {
      const total = data.receipts.reduce((s, r) => s + Number(r.amount || 0), 0);
      const dates = new Set(data.receipts.map(r => r.date));
      const byGroup = {};
      Object.keys(GROUPS).forEach(g => { byGroup[g] = { amount: 0, count: 0 }; });
      data.receipts.forEach(r => {
        const g = r.group || 'unknown';
        if (!byGroup[g]) byGroup[g] = { amount: 0, count: 0 };
        byGroup[g].amount += Number(r.amount || 0);
        byGroup[g].count += 1;
      });
      return { total, days: dates.size, byGroup };
    }

    function groupByDate() {
      const map = new Map();
      data.receipts
        .slice()
        .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time))
        .forEach(r => {
          if (!map.has(r.date)) map.set(r.date, []);
          map.get(r.date).push(r);
        });
      return map;
    }

    function render() {
      const stats = calcStats();
      const grouped = groupByDate();
      const app = document.getElementById('app');

      let summaryHtml = '';
      Object.entries(GROUPS).forEach(([key, label]) => {
        const g = stats.byGroup[key] || { amount: 0, count: 0 };
        if (g.count === 0) return;
        summaryHtml += `
          <div class="summary-card">
            <div class="cat">${label}</div>
            <div class="amount">${fmt(g.amount)}</div>
            <div class="count">${g.count} 筆</div>
          </div>`;
      });

      summaryHtml += `
        <div class="summary-card total">
          <div>
            <div class="cat" style="color:var(--accent-dark);font-weight:600;">合計</div>
            <div class="count">${data.receipts.length} 筆消費</div>
          </div>
          <div class="amount">${fmt(stats.total)}</div>
        </div>`;

      let sectionsHtml = '';
      grouped.forEach((rows, date) => {
        const subtotal = rows.reduce((s, r) => s + Number(r.amount || 0), 0);
        sectionsHtml += `
          <section class="section" data-date="${date}">
            <div class="section-header">
              <span class="date-badge">${dateLabel(date)}<span class="subtotal">小計 ${fmt(subtotal)}</span></span>
              <h2>消費明細</h2>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>時間</th><th>金額</th><th>地點</th><th>項目</th><th>照片</th>
                    ${editing ? '<th class="edit-only">操作</th>' : ''}
                  </tr>
                </thead>
                <tbody>
                  ${rows.map(r => renderRow(r)).join('')}
                </tbody>
              </table>
            </div>
            ${editing ? `<button class="btn btn-sm btn-primary add-row-btn edit-only" data-add-date="${date}" type="button">＋ 此日新增一筆</button>` : ''}
          </section>`;
      });

      const notesHtml = data.notes.map((n, i) =>
        editing
          ? `<li><span class="editable" contenteditable="true" data-note="${i}">${esc(n)}</span></li>`
          : `<li>${esc(n)}</li>`
      ).join('');

      app.innerHTML = `
        <header class="hero">
          <h1 ${editing ? 'class="editable" contenteditable="true" data-field="title"' : ''}>${esc(data.meta.title)}</h1>
          <p ${editing ? 'class="editable" contenteditable="true" data-field="subtitle"' : ''}>${esc(data.meta.subtitle)} · 共 ${data.receipts.length} 筆消費</p>
          <div class="hero-meta">
            <div class="hero-stat">
              <div class="label">總消費金額</div>
              <div class="value">${fmt(stats.total)}</div>
            </div>
            <div class="hero-stat">
              <div class="label">收據筆數</div>
              <div class="value">${data.receipts.length}</div>
            </div>
            <div class="hero-stat">
              <div class="label">消費天數</div>
              <div class="value">${stats.days} 天</div>
            </div>
          </div>
        </header>
        <section class="summary-grid" aria-label="大類別統計">${summaryHtml}</section>
        ${sectionsHtml}
        <section class="notes">
          <h3>備註</h3>
          <ul>${notesHtml}</ul>
          ${editing ? '<button class="btn btn-sm edit-only" id="btn-add-note" type="button" style="margin-top:0.75rem;">＋ 新增備註</button>' : ''}
        </section>
        <footer ${editing ? 'class="editable" contenteditable="true" data-field="footer"' : ''}>${esc(data.meta.footer)}</footer>`;

      bindEvents();
    }

    function flagClass(text) {
      if (!text) return '';
      const safe = String(text).replace(/\s/g, '');
      return ['不算','平分','部分平分','永峻付','方方的'].includes(safe) ? `flag-${safe}` : '';
    }

    function renderRow(r) {
      const tagClass = TAG_CLASS[r.group] || 'tag-unknown';
      const flag = r.flag ? `<span class="flag ${flagClass(r.flag)}">${esc(r.flag)}</span>` : '';
      const href = photoLink(r.photo);

      if (!editing) {
        return `<tr data-id="${r.id}">
          <td class="time-cell">${esc(r.time)}</td>
          <td class="amount-cell">${fmt(r.amount)}</td>
          <td class="location">${esc(r.location)}</td>
          <td class="items">${esc(r.items)}${flag}<span class="tag ${tagClass}">${esc(r.tag)}</span></td>
          <td><span class="photo-ref">${href ? `<a href="${href}" target="_blank">${esc(r.photo)}</a>` : esc(r.photo)}</span></td>
        </tr>`;
      }

      const groupOpts = Object.entries(GROUPS).map(([k, v]) =>
        `<option value="${k}" ${r.group === k ? 'selected' : ''}>${v}</option>`
      ).join('');

      return `<tr data-id="${r.id}">
        <td><input class="edit-input" data-f="time" value="${escAttr(r.time)}"></td>
        <td><input class="edit-input amount" data-f="amount" type="number" value="${r.amount}"></td>
        <td><input class="edit-input" data-f="location" value="${escAttr(r.location)}"></td>
        <td>
          <input class="edit-input" data-f="items" value="${escAttr(r.items)}">
          <input class="edit-input" data-f="tag" value="${escAttr(r.tag)}" placeholder="標籤" style="margin-top:0.35rem;">
          <input class="edit-input" data-f="flag" value="${escAttr(r.flag)}" placeholder="備註旗標（可留空）" style="margin-top:0.35rem;">
          <select class="edit-select" data-f="group" style="margin-top:0.35rem;">${groupOpts}</select>
        </td>
        <td><input class="edit-input" data-f="photo" value="${escAttr(r.photo)}"></td>
        <td class="edit-only">
          <button class="btn btn-sm btn-danger" data-del="${r.id}" type="button">刪除</button>
        </td>
      </tr>`;
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escAttr(s) { return esc(s).replace(/'/g,'&#39;'); }

    function bindEvents() {
      document.querySelectorAll('[data-add-date]').forEach(btn => {
        btn.onclick = () => {
          data.receipts.push({
            id: nextId++, date: btn.dataset.addDate, time: '—',
            amount: 0, location: '', items: '', group: 'food',
            tag: '餐飲', photo: '', flag: '',
          });
          saveData(); render();
        };
      });

      document.querySelectorAll('[data-del]').forEach(btn => {
        btn.onclick = () => {
          if (!confirm('確定刪除此筆消費？')) return;
          const id = Number(btn.dataset.del);
          data.receipts = data.receipts.filter(r => r.id !== id);
          saveData(); render();
        };
      });

      document.querySelectorAll('tr[data-id] input, tr[data-id] select').forEach(el => {
        const save = () => {
          const row = el.closest('tr');
          const id = Number(row.dataset.id);
          const r = data.receipts.find(x => x.id === id);
          if (!r) return;
          const f = el.dataset.f;
          r[f] = f === 'amount' ? Number(el.value) || 0 : el.value;
          saveData();
          updateSubtotals();
        };
        el.addEventListener('change', save);
        el.addEventListener('blur', save);
      });

      document.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('blur', () => {
          data.meta[el.dataset.field] = el.textContent.trim();
          saveData();
        });
      });

      document.querySelectorAll('[data-note]').forEach(el => {
        el.addEventListener('blur', () => {
          data.notes[Number(el.dataset.note)] = el.textContent.trim();
          saveData();
        });
      });

      const addNote = document.getElementById('btn-add-note');
      if (addNote) {
        addNote.onclick = () => {
          data.notes.push('新備註');
          saveData(); render();
        };
      }
    }

    function updateSubtotals() {
      const stats = calcStats();
      document.querySelectorAll('.hero-stat .value')[0].textContent = fmt(stats.total);
      document.querySelectorAll('.hero-stat .value')[1].textContent = data.receipts.length;
      document.querySelectorAll('.hero-stat .value')[2].textContent = stats.days + ' 天';
      document.querySelectorAll('.summary-grid')[0].outerHTML =
        '<section class="summary-grid" aria-label="大類別統計">' +
        (() => {
          let html = '';
          Object.entries(GROUPS).forEach(([key, label]) => {
            const g = stats.byGroup[key] || { amount: 0, count: 0 };
            if (g.count === 0) return;
            html += `<div class="summary-card"><div class="cat">${label}</div><div class="amount">${fmt(g.amount)}</div><div class="count">${g.count} 筆</div></div>`;
          });
          html += `<div class="summary-card total"><div><div class="cat" style="color:var(--accent-dark);font-weight:600;">合計</div><div class="count">${data.receipts.length} 筆消費</div></div><div class="amount">${fmt(stats.total)}</div></div>`;
          return html;
        })() + '</section>';

      groupByDate().forEach((rows, date) => {
        const subtotal = rows.reduce((s, r) => s + Number(r.amount || 0), 0);
        const section = document.querySelector(`section[data-date="${date}"] .subtotal`);
        if (section) section.textContent = '小計 ' + fmt(subtotal);
      });
    }

    function toggleEdit() {
      editing = !editing;
      document.body.classList.toggle('editing', editing);
      document.getElementById('toolbar').classList.toggle('editing', editing);
      const btn = document.getElementById('btn-edit');
      btn.textContent = editing ? '✅ 完成編輯' : '✏️ 編輯';
      btn.classList.toggle('active', editing);
      render();
    }

    document.getElementById('btn-edit').onclick = toggleEdit;

    document.getElementById('btn-add').onclick = () => {
      const today = data.receipts.length ? data.receipts[data.receipts.length - 1].date : '2026-06-09';
      data.receipts.push({
        id: nextId++, date: today, time: '—',
        amount: 0, location: '', items: '', group: 'food',
        tag: '餐飲', photo: '', flag: '',
      });
      saveData(); render();
    };

    document.getElementById('btn-export').onclick = () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'japan-receipts.json';
      a.click();
      URL.revokeObjectURL(a.href);
    };

    document.getElementById('btn-import').onclick = () => {
      document.getElementById('import-file').click();
    };

    document.getElementById('import-file').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!imported.receipts || !imported.meta) throw new Error('格式不正確');
          data = imported;
          nextId = Math.max(0, ...data.receipts.map(r => r.id)) + 1;
          saveData(); render();
          alert('匯入成功！');
        } catch (err) {
          alert('匯入失敗：' + err.message);
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    };

    document.getElementById('btn-reset').onclick = () => {
      if (!confirm('確定還原為預設資料？所有本機修改將清除。')) return;
      data = structuredClone(DEFAULT_DATA);
      nextId = 33;
      saveData(); render();
    };

    render();
  </script>
</body>
</html>
